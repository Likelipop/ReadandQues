<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhập Bài Báo Tiếng Anh</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-lg">
        <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Rèn Luyện Tiếng Anh Qua Báo Chí</h1>
        <p class="text-sm text-gray-500 text-center mb-6">Dán link bài báo tiếng Anh (BBC, CNN...) để hệ thống cào dữ liệu và chuẩn bị tạo Quiz.</p>

        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <div class="p-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-blue-100 text-blue-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'articles:import_article' %}" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">URL Bài Báo:</label>
                <input type="url" name="url" placeholder="https://www.bbc.com/news/..." required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            
            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200">
                Cào Báo & Xử Lý
            </button>
        </form>
    </div>

</body>
</html>
