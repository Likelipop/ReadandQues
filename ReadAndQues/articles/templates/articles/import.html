<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Anh Qua Tin Tức - AI Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="max-w-2xl mx-auto pt-20 px-4">
        <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
            <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">📰 Nhập Bài Báo Tiếng Anh</h1>
            <p class="text-gray-500 text-sm text-center mb-6">Dán đường link (URL) bài báo tiếng Anh vào đây, hệ thống AI sẽ tự động phân tích từ vựng, ngữ pháp và tạo quiz thử thách cho bạn.</p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="p-4 mb-4 text-sm rounded-lg {% if message.tags == 'error' %}bg-red-50 text-red-800{% else %}bg-green-50 text-green-800{% endif %}">
                        {{ message }}
                    </div>
                 font-sm           {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'articles:import_article' %}" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Đường dẫn bài báo (URL)</label>
                    <input type="url" 
                           name="url" 
                           required 
                           placeholder="https://www.bbc.com/news/articles/..." 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                
                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg shadow transition duration-200 flex justify-center items-center gap-2">
                    ✨ Generate Quiz với AI LangGraph
                </button>
            </form>
        </div>
    </div>
</body>
</html>
